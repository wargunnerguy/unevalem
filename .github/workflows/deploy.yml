name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'   # 06:00 EET daily
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch content from Google Sheets (Apps Script proxy)
        run: npm run fetch-content
        env:
          SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /
          SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}
          # Google Analytics id is baked into the build from the nuxt.config
          # runtimeConfig.public.gaId default (G-D921C30JEQ) — no secret needed.
          # To change it, set a NUXT_PUBLIC_GA_ID repo variable and reference it
          # here as ${{ vars.NUXT_PUBLIC_GA_ID }} (only if the variable is set).

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - uses: actions/deploy-pages@v4
        id: deployment
